<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tropos</title>
</head>
<body style="background:black; color:white; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">

  <div>
    <h1>Aquí.</h1>
    <textarea id="input" style="width:300px; height:100px;"></textarea>
  </div>

  <script>
    console.log("Tropos JS cargado");

    const textarea = document.getElementById("input");

    textarea.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();

        const content = textarea.value.trim();
        if (!content) return;

        console.log("Enviando:", content);

        fetch("http://127.0.0.1:5000/submit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ content })
        })
        .then(res => res.json())
        .then(data => {
          console.log("Respuesta:", data);
          textarea.value = "";
        })
        .catch(err => console.error(err));
      }
    });
  </script>

</body>
</html>
